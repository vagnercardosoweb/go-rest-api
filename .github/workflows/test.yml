name: Tests

concurrency:
  group: "${{ github.ref}}:tests"
  cancel-in-progress: true

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - "go.mod"
      - ".github/workflows/test.yml"
      - "Makefile"
      - "**/*.go"
      - "go.sum"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true

      - name: Install development tools
        run: make install_tools

      - name: Run CI
        run: make ci
