networks:
  go-rest-api-network:
    driver: bridge

volumes:
  go-rest-api-redis-vl:
  go-rest-api-postgres-vl:

services:
  api:
    tty: true
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    container_name: go-rest-api-api
    env_file: .env.development
    security_opt:
      - no-new-privileges:true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/go/src
    networks:
      - go-rest-api-network
    ports:
      - "${DOCKER_PORT:-3000}:3000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - RUN_IN_DOCKER=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  postgres:
    tty: true
    image: postgres:18-alpine
    restart: unless-stopped
    container_name: go-rest-api-postgres
    env_file: .env.development
    volumes:
      - go-rest-api-postgres-vl:/var/lib/postgresql/data
    networks:
      - go-rest-api-network
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME:-root}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-root}
      - POSTGRES_DB=${DB_NAME:-development}
      - PGDATA=/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    tty: true
    image: bitnami/redis:latest
    restart: unless-stopped
    container_name: go-rest-api-redis
    env_file: .env.development
    volumes:
      - go-rest-api-redis-vl:/bitnami/redis/data
    networks:
      - go-rest-api-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
      - ALLOW_EMPTY_PASSWORD=no
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
